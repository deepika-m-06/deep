<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#007BFF,#00C6FF);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:380px;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,.3);
    text-align:center;
}

.logo{
    width:90px;
    margin-bottom:15px;
}

h2{
    color:#8B0000;
    margin-bottom:5px;
}

h3{
    color:#444;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#0056b3;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#003d80;
}
</style>

</head>

<body>

<div class="login-box">

<img src="logo.png" class="logo" alt="College Logo">

<h2>Adhiparasakthi Engineering College</h2>

<h3>Student Information Form</h3>

<form>

<input type="text" placeholder="Student Name" required>

<input type="text" placeholder="Student ID" required>

<input type="email" placeholder="College Email" required>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
