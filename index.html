<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Search</title>
<style>
body{
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f2f2f2;
}

.search-box{
    display:flex;
    width:600px;
    border:1px solid #ccc;
    border-radius:30px;
    overflow:hidden;
    background:#fff;
}

input{
    flex:1;
    border:none;
    outline:none;
    padding:18px;
    font-size:18px;
}

button{
    border:none;
    padding:18px 30px;
    background:#0d6efd;
    color:white;
    cursor:pointer;
}

#result{
    margin-top:20px;
    text-align:center;
}
</style>
</head>

<body>

<div>
    <div class="search-box">
        <input type="text" id="search" placeholder="Enter Register Number">
        <button onclick="searchStudent()">Search</button>
    </div>

    <div id="result"></div>
</div>

<script>
const students = [
    {
        regno:"23CSE001",
        name:"Deepika Devi",
        department:"CSE",
        year:"III"
    },
    {
        regno:"23CSE002",
        name:"Arun",
        department:"CSE",
        year:"III"
    }
];

function searchStudent(){

const value=document.getElementById("search").value.trim();

const student=students.find(s=>s.regno===value);

if(student){
document.getElementById("result").innerHTML=`
<h2>Student Details</h2>
<p><b>Name:</b> ${student.name}</p>
<p><b>Register No:</b> ${student.regno}</p>
<p><b>Department:</b> ${student.department}</p>
<p><b>Year:</b> ${student.year}</p>
`;
}else{
document.getElementById("result").innerHTML="<h2>No Record Found</h2>";
}
}
</script>

</body>
</html>
